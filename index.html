<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lab Tracker PWA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-50 font-sans antialiased select-none">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Fixed: Pure React SVG Icons. No DOM mutation, no external script dependencies, zero crashes.
    function Icon({ name, size = 20, className = "" }) {
      const paths = {
        settings: "M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z",
        award: "M12 15a6 6 0 1 0 0-12 6 6 0 0 0 0 12z M8.21 13.89L7 23l5-3 5 3-1.21-9.12",
        "alert-circle": "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12 6.477 22 12 22z M12 8v4 M12 16h.01",
        "check-circle-2": "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12 6.477 22 12 22z M9 11l2 2 4-4",
        "refresh-cw": "M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8 M3 3v5h5 M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16 M21 21v-5h-5",
        sparkles: "M12 3v16M3 12h16M5 5l14 14M5 19L14.5 9.5",
        user: "M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2 M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
        mic: "M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z M19 10v1a7 7 0 0 1-14 0v-1 M12 19v3M8 22h8",
        camera: "M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z M12 17a4 4 0 1 0 0-8 4 4 0 0 0 0 8z",
        send: "M22 2L11 13 M22 2l-7 20-4-9-9-4Z"
      };

      return (
        <svg 
          viewBox="0 0 24 24" 
          width={size} 
          height={size} 
          fill="none" 
          stroke="currentColor" 
          strokeWidth="2" 
          strokeLinecap="round" 
          strokeLinejoin="round" 
          className={`inline-block ${className}`}
        >
          <path d={paths[name] || "M12 2v20M2 12h20"} />
        </svg>
      );
    }

    function App() {
      const [scriptUrl, setScriptUrl] = useState('');
      const [isConfigured, setIsConfigured] = useState(false);
      
      const [students, setStudents] = useState([]);
      const [badges, setBadges] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');

      const [selectedStudent, setSelectedStudent] = useState('');
      const [selectedBadge, setSelectedBadge] = useState('');
      const [transcript, setTranscript] = useState('');
      const [photoBase64, setPhotoBase64] = useState('');
      
      const [isRecording, setIsRecording] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState('');
      const [successMessage, setSuccessMessage] = useState('');
      const [autoSelectAlert, setAutoSelectAlert] = useState('');

      const recognitionRef = useRef(null);

      // Fixed: Wrapped localStorage access in a try-catch to prevent iframe security policy failures
      useEffect(() => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run.withSuccessHandler((url) => {
            setScriptUrl(url);
            setIsConfigured(true);
          }).getScriptUrl();
        } else {
          let localUrl = '';
          try {
            localUrl = localStorage.getItem('labTrackerUrl') || '';
          } catch (e) {
            console.warn("Storage restricted inside AppScript sandbox container:", e);
          }
          setScriptUrl(localUrl);
          setIsConfigured(!!localUrl);
        }
      }, []);

      useEffect(() => { if (isConfigured && scriptUrl) { fetchData(); } }, [isConfigured, scriptUrl]);

      const fetchData = async () => {
        setIsLoading(true);
        setError('');
        try {
          const stuRes = await fetch(`${scriptUrl}?action=getStudents`);
          const stuData = await stuRes.json();
          if (stuData.status === 'success') {
            setStudents(stuData.data.length > 0 ? stuData.data : [{ 'Name': 'Add Students to Sheet' }]);
          } else { throw new Error(stuData.message); }

          const badgeRes = await fetch(`${scriptUrl}?action=getBadges`);
          const badgeData = await badgeRes.json();
          if (badgeData.status === 'success') {
            setBadges(badgeData.data.length > 0 ? badgeData.data : [{ 'Badge Name': 'Add Badges to Sheet' }]);
          } else { throw new Error(badgeData.message); }
        } catch (err) {
          setError('Failed to download active lists. Please check your setup deployment.');
          console.error(err);
        } finally {
          setIsLoading(false);
        }
      };

      const autoParseTranscript = (text) => {
        if (!text) return;
        const lowercaseText = text.toLowerCase();
        let matchedStudent = null;
        let matchedBadge = null;
        let matchedDetails = [];

        students.forEach(student => {
          const sName = student.Name || student['Student Name'] || '';
          if (!sName || sName.startsWith('Add Students')) return;
          const sNameLower = sName.toLowerCase();
          const firstName = sNameLower.split(' ')[0];

          if (lowercaseText.includes(sNameLower)) {
            matchedStudent = sName;
          } else if (firstName && firstName.length > 2 && lowercaseText.includes(firstName)) {
            matchedStudent = sName;
          }
        });

        badges.forEach(badge => {
          const bName = badge['Badge Name'] || badge.Name || '';
          if (!bName || bName.startsWith('Add Badges')) return;
          const bNameLower = bName.toLowerCase();
          if (lowercaseText.includes(bNameLower)) {
            matchedBadge = bName;
          } else {
            const keywords = bNameLower.split(/[\s/]+/);
            keywords.forEach(word => {
              if (word.length > 4 && lowercaseText.includes(word)) {
                matchedBadge = bName;
              }
            });
          }
        });

        if (matchedStudent) { setSelectedStudent(matchedStudent); matchedDetails.push(matchedStudent); }
        if (matchedBadge) { setSelectedBadge(matchedBadge); matchedDetails.push(matchedBadge); }

        if (matchedDetails.length > 0) {
          setAutoSelectAlert(`Voice Match Found! 🪄 Found: ${matchedDetails.join(' | ')}`);
          setTimeout(() => setAutoSelectAlert(''), 4500);
        }
      };

      const toggleRecording = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setError("Voice speech recognition is not supported in this browser profile.");
          return;
        }

        if (isRecording) {
          if (recognitionRef.current) { recognitionRef.current.stop(); }
          setIsRecording(false);
          return;
        }

        try {
          const recognition = new SpeechRecognition();
          recognition.continuous = false;
          recognition.interimResults = false;
          recognition.lang = 'en-US';

          recognition.onstart = () => { setIsRecording(true); setError(''); };
          recognition.onend = () => setIsRecording(false);
          recognition.onerror = (e) => { 
            setIsRecording(false);
            setError(`Voice recognition issue: ${e.error}. Check browser permissions.`); 
          };

          recognition.onresult = (e) => {
            const resultText = e.results[0][0].transcript;
            setTranscript(prev => {
              const updated = prev ? prev + ' ' + resultText : resultText;
              autoParseTranscript(updated);
              return updated;
            });
          };

          recognitionRef.current = recognition;
          recognition.start();
        } catch (e) {
          setIsRecording(false);
          setError("Could not launch microphone module.");
        }
      };

      const handleImageCapture = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsLoading(true);
        setSubmitStatus('Optimizing image quality...');
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 500; 
            const scaleSize = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scaleSize;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
            setPhotoBase64(compressedBase64);
            setIsLoading(false);
            setSubmitStatus('');
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!selectedStudent || !selectedBadge) {
          setError('Please select both a student and a badge.');
          return;
        }

        setIsSubmitting(true);
        setError('');
        setSubmitStatus('Connecting to Google API...');
        const payload = {
          action: 'postEvidence',
          studentId: selectedStudent,
          badgeId: selectedBadge,
          voiceTranscript: transcript,
          photoData: photoBase64
        };
        try {
          setSubmitStatus('Sending data & uploading file (please wait)...');
          const response = await fetch(scriptUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          setSubmitStatus('Waiting for confirmation from Google Drive...');
          const result = await response.json();
          if (result.status === 'success') {
            setSuccessMessage('Successfully logged! Row added and high-res image link created on Google Drive.');
            setSelectedStudent('');
            setSelectedBadge('');
            setTranscript('');
            setPhotoBase64('');
            setTimeout(() => setSuccessMessage(''), 4000);
          } else {
            throw new Error(result.message);
          }
        } catch (err) {
          setError('Failed to submit entry: ' + err.message);
        } finally {
          setIsSubmitting(false);
          setSubmitStatus('');
        }
      };

      if (!isConfigured) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-6">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-4">
              <div className="flex justify-center text-blue-600"><Icon name="settings" size={48} /></div>
              <h1 className="text-xl font-bold text-center text-slate-800">Lab Tracker Configuration</h1>
              <form 
                onSubmit={(e) => {
                  e.preventDefault();
                  const val = e.target.elements.url.value.trim();
                  if (val) {
                    try {
                      localStorage.setItem('labTrackerUrl', val);
                    } catch(err) {
                      console.warn("Could not write config to local storage sandbox:", err);
                    }
                    setScriptUrl(val);
                    setIsConfigured(true);
                  }
                }} 
                className="space-y-4"
              >
                <input 
                  type="url" 
                  name="url" 
                  required 
                  placeholder="https://script.google.com/macros/s/..." 
                  className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" 
                />
                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
                  Connect Web App API
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-20">
          <header className="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
            <h1 className="text-xl font-bold flex items-center gap-2">
              <Icon name="award" size={24} /> Lab Tracker
            </h1>
            <button 
              onClick={() => { 
                try { localStorage.removeItem('labTrackerUrl'); } catch(e){}
                setIsConfigured(false); 
              }} 
              className="text-xs bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-full font-semibold transition"
            >
              Configure API
            </button>
          </header>

          <main className="max-w-lg mx-auto p-4 space-y-6 mt-2">
            
            {error && (
              <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-md text-red-700 flex items-start gap-2">
                <Icon name="alert-circle" className="text-red-500 mt-0.5" />
                <div className="text-sm">
                  <p className="font-bold">Error Occurred</p>
                  <p className="font-medium">{error}</p>
                </div>
              </div>
            )}
            
            {successMessage && (
              <div className="bg-green-50 border-l-4 border-green-500 p-4 rounded-md text-green-700 flex items-center gap-2">
                <Icon name="check-circle-2" className="text-green-500" />
                <p className="text-sm font-semibold">{successMessage}</p>
              </div>
            )}

            {submitStatus && (
              <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-md text-blue-700 flex items-center gap-2">
                <Icon name="refresh-cw" className="animate-spin text-blue-500" />
                <p className="text-sm font-semibold">{submitStatus}</p>
              </div>
            )}

            {autoSelectAlert && (
              <div className="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-md text-indigo-700 flex items-center gap-2 animate-bounce">
                <Icon name="sparkles" className="text-indigo-500" />
                <p className="text-sm font-bold">{autoSelectAlert}</p>
              </div>
            )}

            {isLoading ? (
              <div className="flex flex-col items-center justify-center py-12 space-y-4 text-slate-500">
                <Icon name="refresh-cw" className="animate-spin text-blue-600" size={32} />
                <p className="text-sm font-medium">Loading details...</p>
              </div>
            ) : (
              <form onSubmit={handleSubmit} className="space-y-6">
                
                {/* Student Selector */}
                <div className="space-y-2">
                  <label className="text-sm font-bold text-slate-700 flex items-center gap-2">
                    <Icon name="user" size={16} /> <span>Select Student</span>
                  </label>
                  <select 
                    value={selectedStudent} 
                    onChange={(e) => setSelectedStudent(e.target.value)} 
                    className="w-full bg-white border border-slate-300 rounded-xl p-3 text-lg outline-none shadow-sm focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="">-- Choose a student --</option>
                    {students.map((s, i) => (
                      <option key={i} value={s.Name || s['Student Name'] || JSON.stringify(s)}>
                        {s.Name || s['Student Name'] || `Row ${i+1}`}
                      </option>
                    ))}
                  </select>
                </div>

                {/* Badge Selector */}
                <div className="space-y-2">
                  <label className="text-sm font-bold text-slate-700 flex items-center gap-2">
                    <Icon name="award" size={16} /> <span>Select Skill/Badge</span>
                  </label>
                  <select 
                    value={selectedBadge} 
                    onChange={(e) => setSelectedBadge(e.target.value)} 
                    className="w-full bg-white border border-slate-300 rounded-xl p-3 text-lg outline-none shadow-sm focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="">-- Choose a badge --</option>
                    {badges.map((b, i) => (
                      <option key={i} value={b['Badge Name'] || b.Name || JSON.stringify(b)}>
                        {b['Badge Name'] || b.Name || `Row ${i+1}`}
                      </option>
                    ))}
                  </select>
                </div>

                {/* Dictation Segment */}
                <div className="space-y-2">
                  <div className="flex justify-between items-end">
                    <label className="text-sm font-bold text-slate-700">Observation Notes</label>
                    <button 
                      type="button" 
                      onClick={toggleRecording} 
                      className={`flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-semibold transition ${
                        isRecording ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'
                      }`}
                    >
                      <Icon name="mic" size={16} />
                      <span>{isRecording ? 'Recording...' : 'Dictate'}</span>
                    </button>
                  </div>
                  <textarea 
                    value={transcript} 
                    onChange={(e) => setTranscript(e.target.value)} 
                    placeholder="Type or dictate what you observed..." 
                    rows="4" 
                    className="w-full bg-white border border-slate-300 rounded-xl p-3 outline-none shadow-sm focus:ring-2 focus:ring-blue-500"
                  ></textarea>
                </div>

                {/* Photo Element */}
                <div className="space-y-2">
                  <label className="text-sm font-bold text-slate-700">Photographic Evidence</label>
                  {!photoBase64 ? (
                    <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl bg-white hover:bg-slate-50 cursor-pointer">
                      <div className="flex flex-col items-center space-y-2 text-slate-400">
                        <Icon name="camera" size={32} />
                        <span className="font-semibold text-sm">Tap to Snap Photo</span>
                      </div>
                      <input 
                        type="file" 
                        accept="image/*" 
                        capture="environment" 
                        onChange={handleImageCapture} 
                        className="hidden" 
                      />
                    </label>
                  ) : (
                    <div className="relative rounded-xl overflow-hidden shadow-md border">
                      <img src={photoBase64} alt="Preview" className="w-full h-auto object-cover" />
                      <button 
                        type="button" 
                        onClick={() => setPhotoBase64('')} 
                        className="absolute top-2 right-2 bg-slate-900/80 text-white px-3 py-1 rounded-full text-sm font-semibold backdrop-blur-sm"
                      >
                        Retake
                      </button>
                    </div>
                  )}
                </div>

                {/* Submission CTA */}
                <button 
                  type="submit" 
                  disabled={isSubmitting} 
                  className={`w-full flex items-center justify-center gap-2 text-white font-bold text-lg py-4 rounded-xl shadow-md transition active:scale-95 ${
                    isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'
                  }`}
                >
                  {isSubmitting ? (
                    <>
                      <Icon name="refresh-cw" className="animate-spin" size={24} />
                      <span>Saving Evidence...</span>
                    </>
                  ) : (
                    <>
                      <Icon name="send" size={24} />
                      <span>Submit Evidence</span>
                    </>
                  )}
                </button>
              </form>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
