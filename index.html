<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lab Tracker PWA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-slate-50 font-sans antialiased select-none">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function Icon({ name, size = 20, className = "" }) {
      useEffect(() => { if (window.lucide) { window.lucide.createIcons(); } }, [name]);
      return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
    }

    function App() {
      const [scriptUrl, setScriptUrl] = useState('');
      const [isConfigured, setIsConfigured] = useState(false);
      
      const [students, setStudents] = useState([]);
      const [badges, setBadges] = useState([]);
      const [skills, setSkills] = useState([]);             // Holds dynamic configuration
      const [skillScores, setSkillScores] = useState({});   // Holds values like { EQ: 2 }
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');

      const [selectedStudent, setSelectedStudent] = useState('');
      const [selectedBadge, setSelectedBadge] = useState('');
      const [transcript, setTranscript] = useState('');
      const [photoBase64, setPhotoBase64] = useState('');
      
      const [isRecording, setIsRecording] = useState(false);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState('');
      const [successMessage, setSuccessMessage] = useState('');
      const [autoSelectAlert, setAutoSelectAlert] = useState('');

      const recognitionRef = useRef(null);

      useEffect(() => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run.withSuccessHandler((url) => {
            setScriptUrl(url);
            setIsConfigured(true);
          }).getScriptUrl();
        } else {
          const localUrl = localStorage.getItem('labTrackerUrl') || '';
          setScriptUrl(localUrl);
          setIsConfigured(!!localUrl);
        }
      }, []);

      useEffect(() => { if (isConfigured && scriptUrl) { fetchData(); } }, [isConfigured, scriptUrl]);

      const fetchData = async () => {
        setIsLoading(true);
        setError('');
        try {
          // Fetch Students
          const stuRes = await fetch(`${scriptUrl}?action=getStudents`);
          const stuData = await stuRes.json();
          if (stuData.status === 'success') {
            setStudents(stuData.data);
          } else { throw new Error(stuData.message); }

          // Fetch Badges / Context Tags
          const badgeRes = await fetch(`${scriptUrl}?action=getBadges`);
          const badgeData = await badgeRes.json();
          if (badgeData.status === 'success') {
            setBadges(badgeData.data);
          } else { throw new Error(badgeData.message); }

          // Fetch Skills Configuration
          const skillRes = await fetch(`${scriptUrl}?action=getSkills`);
          const skillData = await skillRes.json();
          if (skillData.status === 'success') {
            setSkills(skillData.data);
          } else { throw new Error(skillData.message); }

        } catch (err) {
          setError('Failed to download initialization parameters.');
          console.error(err);
        } finally {
          setIsLoading(false);
        }
      };

      const autoParseTranscript = (text) => {
        if (!text) return;
        const lowercaseText = text.toLowerCase();
        let matchedStudent = null;
        let matchedBadge = null;
        let matchedDetails = [];

        students.forEach(student => {
          const sName = student.student_name || student.Name || student['Student Name'] || '';
          const sId = student.student_id || sName;
          if (!sName) return;
          const sNameLower = sName.toLowerCase();
          const firstName = sNameLower.split(' ')[0];

          if (lowercaseText.includes(sNameLower)) {
            matchedStudent = sId;
            matchedDetails.push(sName);
          } else if (firstName && firstName.length > 2 && lowercaseText.includes(firstName)) {
            matchedStudent = sId;
            matchedDetails.push(sName);
          }
        });

        badges.forEach(badge => {
          const bName = badge.context_tag || badge['Badge Name'] || badge.Name || '';
          if (!bName) return;
          const bNameLower = bName.toLowerCase();
          if (lowercaseText.includes(bNameLower)) {
            matchedBadge = bName;
            matchedDetails.push(bName);
          }
        });

        if (matchedStudent) setSelectedStudent(matchedStudent);
        if (matchedBadge) setSelectedBadge(matchedBadge);

        if (matchedDetails.length > 0) {
          setAutoSelectAlert(`Voice Match Found! 🪄 ${matchedDetails.join(' | ')}`);
          setTimeout(() => setAutoSelectAlert(''), 4500);
        }
      };

      const toggleRecording = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setError("Speech recognition is not supported in this browser profile.");
          return;
        }

        if (isRecording) {
          if (recognitionRef.current) { recognitionRef.current.stop(); }
          setIsRecording(false);
          return;
        }

        try {
          const recognition = new SpeechRecognition();
          recognition.continuous = false;
          recognition.interimResults = false;
          recognition.lang = 'en-US';

          recognition.onstart = () => { setIsRecording(true); setError(''); };
          recognition.onend = () => setIsRecording(false);
          recognition.onerror = (e) => { 
            setIsRecording(false);
            setError(`Voice recognition issue: ${e.error}`); 
          };

          recognition.onresult = (e) => {
            const resultText = e.results[0][0].transcript;
            setTranscript(prev => {
              const updated = prev ? prev + ' ' + resultText : resultText;
              autoParseTranscript(updated);
              return updated;
            });
          };

          recognitionRef.current = recognition;
          recognition.start();
        } catch (e) {
          setIsRecording(false);
          setError("Could not launch microphone module.");
        }
      };

      const handleImageCapture = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsLoading(true);
        setSubmitStatus('Optimizing image density...');
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 500; 
            const scaleSize = MAX_WIDTH / img.width;
            canvas.width = MAX_WIDTH;
            canvas.height = img.height * scaleSize;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.5);
            setPhotoBase64(compressedBase64);
            setIsLoading(false);
            setSubmitStatus('');
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!selectedStudent || !selectedBadge) {
          setError('Please select both a student and a valid project context.');
          return;
        }

        setIsSubmitting(true);
        setError('');
        setSubmitStatus('Connecting to API Gateway...');
        
        const payload = {
          action: 'postEvidence',
          studentId: selectedStudent,
          badgeId: selectedBadge,
          voiceTranscript: transcript,
          photoData: photoBase64,
          skillCredits: skillScores
        };

        try {
          setSubmitStatus('Appending metrics to transaction ledger...');
          const response = await fetch(scriptUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (result.status === 'success') {
            setSuccessMessage('Entry recorded successfully across ledger channels.');
            setSelectedStudent('');
            setSelectedBadge('');
            setTranscript('');
            setPhotoBase64('');
            setSkillScores({});
            setTimeout(() => setSuccessMessage(''), 4000);
          } else {
            throw new Error(result.message);
          }
        } catch (err) {
          setError('Failed to log transaction record: ' + err.message);
        } finally {
          setIsSubmitting(false);
          setSubmitStatus('');
        }
      };

      if (!isConfigured) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-6">
            <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-4">
              <div className="flex justify-center text-blue-600"><Icon name="settings" size={48} /></div>
              <h1 className="text-xl font-bold text-center text-slate-800">Lab Tracker Link Setup</h1>
              <form 
                onSubmit={(e) => {
                  e.preventDefault();
                  const val = e.target.elements.url.value.trim();
                  if (val) {
                    localStorage.setItem('labTrackerUrl', val);
                    setScriptUrl(val);
                    setIsConfigured(true);
                  }
                }} 
                className="space-y-4"
              >
                <input 
                  type="url" 
                  name="url" 
                  required 
                  placeholder="https://script.google.com/macros/s/..." 
                  className="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500" 
                />
                <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">
                  Connect Web App Endpoints
                </button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-20">
          <header className="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-10">
            <h1 className="text-xl font-bold flex items-center gap-2">
              <Icon name="award" size={24} /> Lab Tracker Ledger
            </h1>
            <button 
              onClick={() => { 
                localStorage.removeItem('labTrackerUrl'); 
                setIsConfigured(false); 
              }} 
              className="text-xs bg-blue-700 hover:bg-blue-800 px-3 py-1.5 rounded-full font-semibold transition"
            >
              Configure API
            </button>
          </header>

          <main className="max-w-lg mx-auto p-4 space-y-6 mt-2">
            
            {error && (
              <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-md text-red-700 flex items-start gap-2">
                <Icon name="alert-circle" className="text-red-500 mt-0.5" />
                <div className="text-sm">
                  <p className="font-bold">Error Occurred</p>
                  <p className="font-medium">{error}</p>
                </div>
              </div>
            )}
            
            {successMessage && (
              <div className="bg-green-50 border-l-4 border-green-500 p-4 rounded-md text-green-700 flex items-center gap-2">
                <Icon name="check-circle-2" className="text-green-500" />
                <p className="text-sm font-semibold">{successMessage}</p>
              </div>
            )}

            {submitStatus && (
              <div className="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-md text-blue-700 flex items-center gap-2">
                <Icon name="refresh-cw" className="animate-spin text-blue-500" />
                <p className="text-sm font-semibold">{submitStatus}</p>
              </div>
            )}

            {autoSelectAlert && (
              <div className="bg-indigo-50 border-l-4 border-indigo-500 p-4 rounded-md text-indigo-700 flex items-center gap-2 animate-bounce">
                <Icon name="sparkles" className="text-indigo-500" />
                <p className="text-sm font-bold">{autoSelectAlert}</p>
              </div>
            )}

            {isLoading ? (
              <div className="flex flex-col items-center justify-center py-12 space-y-4 text-slate-500">
                <Icon name="refresh-cw" className="animate-spin text-blue-600" size={32} />
                <p className="text-sm font-medium">Downloading active datasets...</p>
              </div>
            ) : (
              <form onSubmit={handleSubmit} className="space-y-6">
                
                {/* Student Selector */}
                <div className="space-y-2">
                  <label className="text-sm font-bold text-slate-700 flex items-center gap-2">
                    <Icon name="user" size={16} /> <span>Select Student</span>
                  </label>
                  <select 
                    value={selectedStudent} 
                    onChange={(e) => setSelectedStudent(e.target.value)} 
                    className="w-full bg-white border border-slate-300 rounded-xl p-3 text-lg outline-none shadow-sm focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="">-- Choose a student --</option>
                    {students.map((s, i) => {
                      const idValue = s.student_id || s.Name || s['Student Name'] || i;
                      const displayLabel = s.student_name || s.Name || s['Student Name'] || `Row ${i+1}`;
                      return (
                        <option key={i} value={idValue}>
                          {displayLabel}
                        </option>
                      );
                    })}
                  </select>
                </div>

                {/* Badge/Context Selector */}
                <div className="space-y-2">
                  <label className="text-sm font-bold text-slate-700 flex items-center gap-2">
                    <Icon name="bookmark" size={16} /> <span>Project Context</span>
                  </label>
                  <select 
                    value={selectedBadge} 
                    onChange={(e) => setSelectedBadge(e.target.value)} 
                    className="w-full bg-white border border-slate-300 rounded-xl p-3 text-lg outline-none shadow-sm focus:ring-2 focus:ring-blue-500"
                  >
                    <option value="">-- Choose project focus --</option>
                    {badges.map((b, i) => {
                      const label = b.context_tag || b['Badge Name'] || b.Name || `Focus Row ${i+1}`;
                      return (
                        <option key={i} value={label}>
                          {label}
                        </option>
                      );
                    })}
                  </select>
                </div>

                {/* Dynamic Skills/Credits Assigner Grid */}
                {skills.length > 0 && (
                  <div className="space-y-2">
                    <label className="text-sm font-bold text-slate-700 flex items-center gap-2">
                      <Icon name="check-square" size={16} /> <span>Accredit Skills (Optional)</span>
                    </label>
                    <div className="space-y-2">
                      {skills.map((skill, idx) => {
                        const skillId = skill.skill_category || skill['Skill ID'] || `Skill_${idx}`;
                        const skillName = skill.skill_name || skill['Skill Name'] || skillId;
                        const currentVal = skillScores[skillId];
                        
                        return (
                          <div key={idx} className="flex items-center justify-between bg-white border border-slate-200 p-3 rounded-xl shadow-sm">
                            <div className="flex flex-col pr-2">
                              <span className="font-semibold text-slate-700 text-sm leading-tight">{skillName}</span>
                              <span className="text-xs font-mono text-slate-400 mt-0.5">{skillId}</span>
                            </div>
                            <div className="flex gap-1">
                              {[1, 2, 3].map(score => (
                                <button
                                  key={score}
                                  type="button"
                                  onClick={() => setSkillScores(prev => ({
                                    ...prev,
                                    [skillId]: prev[skillId] === score ? null : score // Toggle off selection if clicked again
                                  }))}
                                  className={`w-9 h-9 rounded-lg font-bold transition flex items-center justify-center text-sm ${
                                    currentVal === score 
                                      ? 'bg-blue-600 text-white shadow-sm scale-105' 
                                      : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                  }`}
                                >
                                  {score}
                                </button>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* Dictation Segment */}
                <div className="space-y-2">
                  <div className="flex justify-between items-end">
                    <label className="text-sm font-bold text-slate-700">Observation Notes</label>
                    <button 
                      type="button" 
                      onClick={toggleRecording} 
                      className={`flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-sm font-semibold transition ${
                        isRecording ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'
                      }`}
                    >
                      <Icon name="mic" size={16} />
                      <span>{isRecording ? 'Recording...' : 'Dictate'}</span>
                    </button>
                  </div>
                  <textarea 
                    value={transcript} 
                    onChange={(e) => setTranscript(e.target.value)} 
                    placeholder="Type or dictate what you observed..." 
                    rows="3" 
                    className="w-full bg-white border border-slate-300 rounded-xl p-3 outline-none shadow-sm focus:ring-2 focus:ring-blue-500"
                  ></textarea>
                </div>

                {/* Photo Element */}
                <div className="space-y-2">
                  <label className="text-sm font-bold text-slate-700">Photographic Evidence</label>
                  {!photoBase64 ? (
                    <label className="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-300 rounded-xl bg-white hover:bg-slate-50 cursor-pointer">
                      <div className="flex flex-col items-center space-y-1 text-slate-400">
                        <Icon name="camera" size={28} />
                        <span className="font-semibold text-xs">Tap to Snap Photo</span>
                      </div>
                      <input 
                        type="file" 
                        accept="image/*" 
                        capture="environment" 
                        onChange={handleImageCapture} 
                        className="hidden" 
                      />
                    </label>
                  ) : (
                    <div className="relative rounded-xl overflow-hidden shadow-md border">
                      <img src={photoBase64} alt="Preview" className="w-full h-auto object-cover" />
                      <button 
                        type="button" 
                        onClick={() => setPhotoBase64('')} 
                        className="absolute top-2 right-2 bg-slate-900/80 text-white px-3 py-1 rounded-full text-sm font-semibold backdrop-blur-sm"
                      >
                        Retake
                      </button>
                    </div>
                  )}
                </div>

                {/* Submission CTA */}
                <button 
                  type="submit" 
                  disabled={isSubmitting} 
                  className={`w-full flex items-center justify-center gap-2 text-white font-bold text-lg py-3.5 rounded-xl shadow-md transition active:scale-95 ${
                    isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'
                  }`}
                >
                  {isSubmitting ? (
                    <>
                      <Icon name="refresh-cw" className="animate-spin" size={22} />
                      <span>Saving Evidence Ledger...</span>
                    </>
                  ) : (
                    <>
                      <Icon name="send" size={22} />
                      <span>Submit Record</span>
                    </>
                  )}
                </button>
              </form>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
